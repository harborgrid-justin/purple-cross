apiVersion: apps/v1
kind: Deployment
metadata:
  name: purple-cross-backend
  namespace: purple-cross
  labels:
    app.kubernetes.io/name: purple-cross-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: purple-cross-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: purple-cross-backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: backend
          image: ghcr.io/harborgrid-justin/purple-cross-backend:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: purple-cross-config
            - secretRef:
                name: purple-cross-secrets
          livenessProbe:
            httpGet:
              path: /health/live
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: purple-cross-backend
  namespace: purple-cross
spec:
  selector:
    app.kubernetes.io/name: purple-cross-backend
  ports:
    - port: 80
      targetPort: 3000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: purple-cross-backend
  namespace: purple-cross
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: purple-cross-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

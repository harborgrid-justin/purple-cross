apiVersion: v1
kind: ConfigMap
metadata:
  name: purple-cross-config
  namespace: purple-cross
data:
  NODE_ENV: "production"
  PORT: "3000"
  API_PREFIX: "/api/v1"
  JWT_ACCESS_EXPIRES_IN: "15m"
  JWT_REFRESH_EXPIRES_IN: "7d"
  RATE_LIMIT_WINDOW_MS: "900000"
  RATE_LIMIT_MAX_REQUESTS: "100"
  MAX_FILE_SIZE: "10485760"
  UPLOAD_DIR: "/app/uploads"
  ENABLE_SWAGGER: "false"
  ENABLE_API_DOCS: "false"
  # CORS_ORIGIN is environment-specific; set in an overlay.
  CORS_ORIGIN: "https://app.example.com"
---
# Secret TEMPLATE — do NOT commit real values. In production, populate this via
# a sealed-secret / external-secrets / cloud secret manager, not plain manifests.
apiVersion: v1
kind: Secret
metadata:
  name: purple-cross-secrets
  namespace: purple-cross
type: Opaque
stringData:
  DATABASE_URL: "postgresql://USER:PASSWORD@HOST:5432/purple_cross?schema=public&connection_limit=10"
  REDIS_URL: "redis://REDIS_HOST:6379"
  JWT_SECRET: "replace-with-32+-char-secret"
  JWT_REFRESH_SECRET: "replace-with-different-32+-char-secret"
  FIELD_ENCRYPTION_KEY: "replace-with-strong-field-encryption-key"

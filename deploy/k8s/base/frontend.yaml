apiVersion: apps/v1
kind: Deployment
metadata:
  name: purple-cross-frontend
  namespace: purple-cross
  labels:
    app.kubernetes.io/name: purple-cross-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: purple-cross-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: purple-cross-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/harborgrid-justin/purple-cross-frontend:latest
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: purple-cross-frontend
  namespace: purple-cross
spec:
  selector:
    app.kubernetes.io/name: purple-cross-frontend
  ports:
    - port: 80
      targetPort: 80
